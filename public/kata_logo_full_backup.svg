    <feFlood flood-color="#C05010" flood-opacity="0.55" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Soft ambient glow — parch -->
  <filter id="pa_glow" x="-30%" y="-30%" width="170%" height="170%">
