<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="528" height="409"
     viewBox="0 0 528 409">
  <defs>

    <!-- Warm dark background -->
    <radialGradient id="bg" cx="50%" cy="42%" r="58%">
      <stop offset="0%"   stop-color="#1C120A"/>
      <stop offset="100%" stop-color="#050302"/>
    </radialGradient>

    <!-- Copper gradient — top-left bright, bottom-right deep -->
    <linearGradient id="cu" x1="87.9" y1="36.0"
                    x2="331.4" y2="284.7"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFE0A8"/>
      <stop offset="6%"   stop-color="#F0A060"/>
      <stop offset="28%"  stop-color="#C86020"/>
      <stop offset="62%"  stop-color="#7A2E0C"/>
      <stop offset="100%" stop-color="#200800"/>
    </linearGradient>

    <!-- Parchment gradient -->
    <linearGradient id="pa" x1="300.9" y1="36.0"
                    x2="473.1" y2="373.0"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFF8E0"/>
      <stop offset="6%"   stop-color="#F0D888"/>
      <stop offset="28%"  stop-color="#C8A040"/>
      <stop offset="62%"  stop-color="#7A5C18"/>
      <stop offset="100%" stop-color="#1E1206"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="sh" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2.5" dy="3.5" stdDeviation="5"
                    flood-color="#000" flood-opacity="0.8"/>
    </filter>

    <!-- Copper glow -->
    <filter id="cg" x="-25%" y="-25%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feFlood flood-color="#C04810" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Parchment glow -->
    <filter id="pg" x="-25%" y="-25%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feFlood flood-color="#C09030" flood-opacity="0.45" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="528" height="409" fill="url(#bg)"/>

