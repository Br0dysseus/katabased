<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>kB Logo Dev</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0C0806;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
    color: rgba(216,196,160,0.5);
    gap: 24px;
  }
  #info {
    font-size: 11px;
    opacity: 0.5;
    text-align: center;
    line-height: 1.8;
  }
  canvas { display: block; }
</style>
</head>
<body>
<div id="canvas-mount"></div>
<div id="info">
  patina sweeps k → B every ~25s &nbsp;|&nbsp;
  crumble on weathered strokes &nbsp;|&nbsp;
  press R to reset clock
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

// ── Seeded RNG ────────────────────────────────────────────────────────────────
function mkRng(seed) {
  let s = seed >>> 0;
  return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0x100000000; };
}

// ── Coordinate helpers ────────────────────────────────────────────────────────
const S = 0.0085, OX = -190, OY = -300;
const vp = (x, y, z = 0) => new THREE.Vector3((x + OX) * S, -(y + OY) * S, z);
const R  = (sw) => sw * S / 2;

// ── Doric fluting ─────────────────────────────────────────────────────────────
function flute(geom, numFlutes, depthFrac) {
  const pos = geom.attributes.position;
  const nrm = geom.attributes.normal;
  const uv  = geom.attributes.uv;
  for (let i = 0; i < pos.count; i++) {
    const a = uv.getY(i) * Math.PI * 2 * numFlutes;
    const t = (1 - Math.cos(a)) / 2;
    const d = depthFrac * t;
    pos.setXYZ(i, pos.getX(i) - nrm.getX(i) * d,
                  pos.getY(i) - nrm.getY(i) * d,
                  pos.getZ(i) - nrm.getZ(i) * d);
  }
  pos.needsUpdate = true;
  geom.computeVertexNormals();
  return geom;
}

// ── Vertex degradation ────────────────────────────────────────────────────────
function degrade(geom, intensity, rng) {
  const pos = geom.attributes.position;
  const nrm = geom.attributes.normal;
  const uv  = geom.attributes.uv;
  for (let i = 0; i < pos.count; i++) {
    const u = uv.getX(i);
    const edgeFactor = Math.pow(Math.max(0, 1 - Math.min(u, 1 - u) * 5), 2.2);
    const d = (rng() - 0.5) * 0.007 * intensity
            + (rng() > 0.38 ? -1 : 1) * rng() * 0.032 * intensity * edgeFactor;
    pos.setXYZ(i, pos.getX(i) + nrm.getX(i) * d,
                  pos.getY(i) + nrm.getY(i) * d,
                  pos.getZ(i) + nrm.getZ(i) * d);
  }
  pos.needsUpdate = true;
  geom.computeVertexNormals();
  return geom;
}

// ── Palette ───────────────────────────────────────────────────────────────────
const PAL = {
  cream:     [0.75,  0.720, 0.660],
  verdigris: [0.055, 0.300, 0.190],
  ochre:     [0.550, 0.280, 0.040],
  grime:     [0.045, 0.035, 0.020],
};

function computePatina(info, scrollLift, shiftX = 0.5) {
  for (const { colorAttr, strokeDeg, vdata } of info) {
    const cols = colorAttr.array;
    const [bR,bG,bB] = PAL.cream;
    const [vR,vG,vB] = PAL.verdigris;
    const [oR,oG,oB] = PAL.ochre;
    const [gR,gG,gB] = PAL.grime;
    for (let i = 0; i < vdata.length; i++) {
      const { nx, ny, n1, n2, n3, n4 } = vdata[i];
      const leftness = Math.max(0, 1.0 - Math.abs(nx - shiftX));
      const effectiveLowness = Math.max(0, (1 - ny) - scrollLift * 1.0 + leftness * 0.3 * scrollLift);
      const pBase = leftness * 0.55 + effectiveLowness * 0.45 + n1 * strokeDeg;
      const pStr  = Math.max(0, Math.min(1, pBase * strokeDeg * (1 + scrollLift * 1.8) + n2 * strokeDeg * 0.5));
      const vFrac = pStr * (0.55 + n3 * 0.30);
      const oFrac = Math.max(0, pStr * (0.28 + n3 * 0.22) - n4 * 0.08);
      const gFrac = effectiveLowness * strokeDeg * (0.10 + n4 * 0.15);
      const bFrac = Math.max(0, 1 - vFrac - oFrac - gFrac);
      cols[i * 3 + 0] = Math.min(1, bR*bFrac + vR*vFrac + oR*oFrac + gR*gFrac);
      cols[i * 3 + 1] = Math.min(1, bG*bFrac + vG*vFrac + oG*oFrac + gG*gFrac);
      cols[i * 3 + 2] = Math.min(1, bB*bFrac + vB*vFrac + oB*oFrac + gB*gFrac);
    }
    colorAttr.needsUpdate = true;
  }
}

// ── Marble map ────────────────────────────────────────────────────────────────
function makeMarbleMap(size = 1024) {
  const rng = mkRng(77);
  const c = document.createElement('canvas'); c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#C8C2B8'; ctx.fillRect(0, 0, size, size);
  for (let vn = 0; vn < 14; vn++) {
    const x0 = rng()*size*1.4-size*0.2, y0 = rng()*size*1.4-size*0.2;
    const ang = rng()*Math.PI+0.1, w = 0.2+rng()*1.8, op = 0.04+rng()*0.10, wav = 0.10+rng()*0.9;
    ctx.save(); ctx.strokeStyle = `rgba(50,42,32,${op})`; ctx.lineWidth = w;
    ctx.beginPath(); let cx = x0, cy = y0; ctx.moveTo(cx, cy);
    for (let i = 0; i < 38; i++) {
      const a2 = ang + Math.sin(i*0.38)*wav;
      cx += Math.cos(a2)*size*0.058 + (rng()-0.5)*4;
      cy += Math.sin(a2)*size*0.058 + (rng()-0.5)*4;
      ctx.lineTo(cx, cy);
    }
    ctx.stroke(); ctx.restore();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1.2, 1);
  return tex;
}

function makeRoughMap(size = 512) {
  const rng = mkRng(133);
  const c = document.createElement('canvas'); c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#3A3A3A'; ctx.fillRect(0, 0, size, size);
  for (let p = 0; p < 22; p++) {
    const px = rng()*size*0.8, py = size*0.15+rng()*size*0.85;
    const rad = size*(0.04+rng()*0.12), v2 = Math.floor(110+rng()*120), op = 0.45+rng()*0.5;
    const grd = ctx.createRadialGradient(px,py,0,px,py,rad);
    grd.addColorStop(0, `rgba(${v2},${v2},${v2},${op})`);
    grd.addColorStop(1, `rgba(${v2},${v2},${v2},0)`);
    ctx.fillStyle = grd; ctx.fillRect(0, 0, size, size);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1.2, 1);
  return tex;
}

// ── Stroke definitions ────────────────────────────────────────────────────────
//
// k geometry based on v9 reference:
//   stem:      x=104, spans B waist (y=257) → B spine bottom (y=484); sw=18
//   joint:     (104, 310) — 53px below B waist, within stem
//   upper arm: short diagonal joint → B waist (174,258); slight curve
//   lower arm: large D-arc bowing LEFT (peak x≈44 at y≈370), landing at B lower lobe bottom (174,408)
//              mirrors B lower lobe curvature; two cubic segments for smooth D shape
// ── Stroke definitions ────────────────────────────────────────────────────────
// k matches B weight. Both arms meet at one vertex (100,268).
// Lower arm bows LEFT ~50px, aligning with B lower lobe vertically. Upper arm straight-diagonal.
const STROKE_DEFS = [
  // ── B — spine + serifs ───────────────────────────────────────────
  { curve: () => new THREE.LineCurve3(vp(174,139), vp(172,461)),                                           sw:23, tSeg:2,  fl:20, deg:0.42 },
  { curve: () => new THREE.LineCurve3(vp(166,139), vp(183,139)),                                           sw:5,  tSeg:2,  fl:10, deg:0.22 },
  { curve: () => new THREE.LineCurve3(vp(164,461), vp(181,461)),                                           sw:5,  tSeg:2,  fl:10, deg:0.62 },
  // ── B — upper lobe ───────────────────────────────────────────────
  { curve: () => new THREE.CubicBezierCurve3(vp(173,152),vp(214,148),vp(258,173),vp(259,205)),             sw:15, tSeg:28, fl:16, deg:0.36 },
  { curve: () => new THREE.CubicBezierCurve3(vp(259,205),vp(261,237),vp(230,254),vp(173,256)),             sw:15, tSeg:28, fl:16, deg:0.46 },
  // ── B — waist loop: S-curve bows 33px left of spine so loop is visible ──
  { curve: () => new THREE.CubicBezierCurve3(vp(173,256),vp(140,253),vp(140,267),vp(173,264)),             sw:14, tSeg:22, fl:14, deg:0.50 },
  // ── B — lower lobe (starts where waist loop ends) ────────────────
  { curve: () => new THREE.CubicBezierCurve3(vp(173,264),vp(220,260),vp(275,284),vp(276,323)),             sw:16, tSeg:28, fl:16, deg:0.56 },
  { curve: () => new THREE.CubicBezierCurve3(vp(276,323),vp(277,363),vp(237,390),vp(173,396)),             sw:16, tSeg:28, fl:16, deg:0.72 },
  // ── k — same weight as B. Stem sw:23. Arms sw:15/16 matching B lobes ─────
  { curve: () => new THREE.LineCurve3(vp(100,182), vp(100,418)),                                           sw:23, tSeg:4,  fl:20, deg:0.52 },
  // Upper arm: gentle diagonal to B spine top
  { curve: () => new THREE.CubicBezierCurve3(vp(100,268),vp(106,262),vp(136,218),vp(174,182)),              sw:15, tSeg:28, fl:16, deg:0.46 },
  // Lower arm: departs straight-down from vertex (clean point), then bows hard LEFT — mirrors B lower lobe arc
  { curve: () => new THREE.CubicBezierCurve3(vp(100,268),vp(100,292),vp(40,348),vp(174,374)),               sw:16, tSeg:28, fl:16, deg:0.60 },
];

// ── Setup ─────────────────────────────────────────────────────────────────────
const W = 520, H = 320;
const mount = document.getElementById('canvas-mount');

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;
renderer.outputColorSpace    = THREE.SRGBColorSpace;
mount.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, W/H, 0.01, 200);
camera.position.set(0, 0, 6.8);
// Design x-bounds: -0.825 (k stem) to 0.731 (B lobe peak) → center ≈ -0.047
camera.lookAt(-0.047, 0, 0);

// Lights
scene.add(new THREE.AmbientLight(0x1E1A14, 1.4));
const key  = new THREE.DirectionalLight(0xFFF2E0, 4.5);  key.position.set(-5, 6, 7);  scene.add(key);
const fill = new THREE.DirectionalLight(0xC8DCFF, 1.2);  fill.position.set(6, -2, 4); scene.add(fill);
const rim  = new THREE.DirectionalLight(0xA0C0E8, 2.4);  rim.position.set(2, 5, -8);  scene.add(rim);
const rake = new THREE.DirectionalLight(0xB8904A, 1.6);  rake.position.set(-5, -4, 2);scene.add(rake);

const marbleMap = makeMarbleMap(1024);
const roughMap  = makeRoughMap(512);
const matRng    = mkRng(42);

function mkMat(deg) {
  const ww = 0.97 + matRng() * 0.06;
  return new THREE.MeshPhysicalMaterial({
    color:              new THREE.Color(ww, ww, ww),
    vertexColors:       true,
    map:                marbleMap,
    roughnessMap:       roughMap,
    roughness:          0.18 + deg * 0.32,
    metalness:          0.0,
    clearcoat:          0.98 - deg * 0.55,
    clearcoatRoughness: 0.04 + deg * 0.44,
    ior:                1.56,
    reflectivity:       0.62,
  });
}

const group = new THREE.Group();
const patinaInfo  = [];
const crumbleInfo = [];

// k bow peak x=48 → world x≈-1.207; B lobe peak x=276 → world x≈0.731
const xMin = -1.25, xMax = 0.80, yMin = -1.45, yMax = 1.45;

STROKE_DEFS.forEach((def, idx) => {
  const r  = R(def.sw);
  const rs = Math.max(40, def.fl * 4);
  let g    = new THREE.TubeGeometry(def.curve(), def.tSeg, r, rs, false);
  g = flute(g, def.fl, r * 0.20);
  g = degrade(g, def.deg * 0.55, mkRng(idx * 1337 + 99));

  const pos = g.attributes.position;
  const nrm = g.attributes.normal;
  const cnt = pos.count;

  const rng2 = mkRng(idx * 2718 + 55);
  const vdata = [];
  for (let i = 0; i < cnt; i++) {
    vdata.push({
      nx: Math.max(0, Math.min(1, (pos.getX(i) - xMin) / (xMax - xMin))),
      ny: Math.max(0, Math.min(1, (pos.getY(i) - yMin) / (yMax - yMin))),
      n1: (rng2() - 0.5) * 0.7,
      n2: (rng2() - 0.5) * 0.5,
      n3: rng2(),
      n4: rng2(),
    });
  }

  const cols = new Float32Array(cnt * 3);
  g.setAttribute('color', new THREE.BufferAttribute(cols, 3));
  const colorAttr = g.attributes.color;
  patinaInfo.push({ colorAttr, strokeDeg: def.deg, vdata });

  if (def.deg > 0.35) {
    const origPos    = new Float32Array(pos.array);
    const noiseFreq  = new Float32Array(cnt);
    const noisePhase = new Float32Array(cnt);
    const rng3 = mkRng(idx * 9973 + 17);
    for (let i = 0; i < cnt; i++) {
      noiseFreq[i]  = 0.4 + rng3() * 1.2;
      noisePhase[i] = rng3() * Math.PI * 2;
    }
    crumbleInfo.push({ posAttr: pos, nrmAttr: nrm, origPos, noiseFreq, noisePhase, deg: def.deg });
  }

  group.add(new THREE.Mesh(g, mkMat(def.deg)));
});
scene.add(group);

computePatina(patinaInfo, 0.20, 0.0);  // start: patina on k side

// ── Animate ───────────────────────────────────────────────────────────────────
let startTime = performance.now();
let frame = 0;

function animate() {
  requestAnimationFrame(animate);
  frame++;
  const t = (performance.now() - startTime) / 1000;

  // Patina — ~25s sweep k→B→k
  const pLift  = 0.28 + 0.22 * Math.sin(t * 0.18) + 0.10 * Math.sin(t * 0.41 + 1.3);
  const shiftX = 0.5 - 0.5 * Math.cos(t * 0.25);
  computePatina(patinaInfo, pLift, shiftX);

  // Crumble — every 2nd frame
  if (frame % 2 === 0) {
    for (const { posAttr, nrmAttr, origPos, noiseFreq, noisePhase, deg } of crumbleInfo) {
      const amp = deg * 0.020;
      for (let i = 0; i < posAttr.count; i++) {
        const d = Math.sin(t * noiseFreq[i] + noisePhase[i]) * amp;
        posAttr.setXYZ(i,
          origPos[i*3]   + nrmAttr.getX(i) * d,
          origPos[i*3+1] + nrmAttr.getY(i) * d,
          origPos[i*3+2] + nrmAttr.getZ(i) * d,
        );
      }
      posAttr.needsUpdate = true;
    }
  }

  renderer.render(scene, camera);
}
animate();

// R key resets clock
document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') startTime = performance.now();
});
</script>
</body>
</html>
